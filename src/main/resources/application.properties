spring.application.name=tracker_backend
spring.config.import=optional:file:.env[.properties]

# DataSource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM}

# Sample flight (placeholder until Phase 2 ingestion provides real data)
sample.flight.callsign=${SAMPLE_FLIGHT_CALLSIGN}
sample.flight.altitude-ft=${SAMPLE_FLIGHT_ALTITUDE_FT}
sample.flight.speed-kmph=${SAMPLE_FLIGHT_SPEED_KMPH}
sample.flight.direction=${SAMPLE_FLIGHT_DIRECTION}
sample.flight.fr24-code=${SAMPLE_FLIGHT_FR24_CODE}
